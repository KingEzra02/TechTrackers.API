<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Sign In placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#233043" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="64" fill="#111c30"/>
  <circle cx="34" cy="32" r="10" fill="#38bdf8"/>
  <text x="56" y="39" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">TechTrackers</text>
  <rect x="470" y="250" width="260" height="30" rx="15" fill="#38bdf8" opacity="0.15"/>
  <text x="600" y="271" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#38bdf8" letter-spacing="2">PUBLIC PAGE</text>
  <text x="600" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="800" fill="#f1f5f9">Sign In</text>
  <text x="600" y="398" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#94a3b8">Email + password login, routed by role (Staff/HOD/Tech/Admin)</text>
  <text x="600" y="640" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">Screenshot placeholder &#8226; replace with a live capture (docs/screenshots/signin.svg)</text>
</svg>
